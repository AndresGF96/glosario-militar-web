<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glosario Militar Pro</title>
    <style>
        :root {
            --verde-olivo: #4B5320;
            --verde-tierra: #353a16;
            --blanco: #ffffff;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: #e9ecef; padding: 20px; display: flex; justify-content: center; }

        .container { 
            width: 100%; max-width: 750px; background: var(--blanco); 
            padding: 40px; border-radius: 10px; border-top: 10px solid var(--verde-olivo);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; color: var(--verde-olivo); text-transform: uppercase; margin-bottom: 30px; }

        .categories-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }

        .btn-cat {
            background-color: var(--verde-olivo); color: white; border: none;
            padding: 12px 20px; border-radius: 25px; cursor: pointer;
            font-weight: bold; font-size: 0.85em; text-transform: uppercase; transition: 0.3s;
        }

        .btn-cat.active { background-color: var(--verde-tierra); transform: scale(1.05); border: 2px solid #f2e8cf; }

        /* ZONA QUE CAMBIA: De mensaje a barra de búsqueda */
        #zona-busqueda { min-height: 80px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }

        .instruccion-inicial {
            font-weight: bold; font-size: 1.3em; color: var(--verde-olivo); text-align: center; text-transform: uppercase;
        }

        #searchBar {
            width: 100%; padding: 15px; border: 2px solid #ced4da; border-radius: 5px; font-size: 16px; outline: none;
        }

        .term-list { list-style: none; padding: 0; margin-top: 20px; }
        .term-item { 
            padding: 20px; border-left: 5px solid var(--verde-olivo); 
            background: #f8f9fa; margin-bottom: 15px; border-radius: 4px;
            animation: fadeIn 0.3s ease;
        }
        .term-title { font-weight: bold; color: var(--verde-olivo); font-size: 1.2em; display: block; margin-bottom: 5px; }
        .term-definition { color: #444; text-align: justify; line-height: 1.5; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>GLOSARIO MILITAR</h1>
    
    <div class="categories-nav">
        <button onclick="activarCategoria('Siglas', this)" class="btn-cat">Mayúsculas / Siglas</button>
        <button onclick="activarCategoria('Términos Militares', this)" class="btn-cat">Términos Militares</button>
        <button onclick="activarCategoria('Expresión gramat', this)" class="btn-cat">Expresión Gramatical</button>
    </div>

    <div id="zona-busqueda">
        <p class="instruccion-inicial">PRIMERO SELECCIONE UNA CATEGORÍA</p>
    </div>

    <ul id="termList" class="term-list"></ul>
</div>

<script>
    let datosGlosario = [];
    let categoriaActiva = "";

    async function cargarBD() {
    // ASEGÚRATE DE QUE ESTE ID SEA EL DE TU NAVEGADOR
    const idHoja = '1IfEtvmo-IVCoL-9Y8XgC81OycP2Pvw1lv9ntKD5ABBs'; 
    const url = `https://docs.google.com/spreadsheets/d/${idHoja}/gviz/tq?tqx=out:json`;

    try {
        const res = await fetch(url);
        if (!res.ok) throw new Error("Error 404: No se encontró la hoja. Revisa el ID.");

        const texto = await res.text();
        
        // Limpieza profunda del formato de Google
        const inicio = texto.indexOf('{');
        const fin = texto.lastIndexOf('}') + 1;
        const json = JSON.parse(texto.substring(inicio, fin));
        
        datosGlosario = json.table.rows.map(row => ({
            Categoria: row.c[0] ? (row.c[0].v || '') : '',
            Concepto: row.c[1] ? (row.c[1].v || '') : '',
            Definicion: row.c[2] ? (row.c[2].v || '') : ''
        }));

        console.log("✅ DATOS CARGADOS:", datosGlosario.length);
        
        // Esto te avisará en pantalla si funcionó
        if(datosGlosario.length > 0) {
            alert("¡Conexión exitosa! " + datosGlosario.length + " términos cargados.");
        }

    } catch (e) { 
        console.error("Fallo:", e.message);
        alert("Sigue fallando: " + e.message);
    }
}
    // NORMALIZAR PARA IGNORAR TILDES Y MAYÚSCULAS
    function normalizar(texto) {
        return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
    }

    function activarCategoria(cat, boton) {
        // 1. REEMPLAZAR MENSAJE POR BARRA DE BÚSQUEDA
        const zona = document.getElementById('zona-busqueda');
        zona.innerHTML = `<input type="text" id="searchBar" placeholder="🔍 Buscando en ${boton.innerText}..." onkeyup="filtrarContenido()">`;

        // 2. ACTIVAR BOTÓN VISUALMENTE
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
        boton.classList.add('active');

        // 3. FILTRAR POR CATEGORÍA
        categoriaActiva = cat;
        const iniciales = datosGlosario.filter(item => 
            normalizar(item.Categoria || "").includes(normalizar(cat))
        );
        renderizar(iniciales);
    }

    function filtrarContenido() {
        const rawInput = document.getElementById('searchBar').value;
        const busquedaUsuario = normalizar(rawInput);
        
        // PALABRAS A IGNORAR (Como se escribe, que es, etc.)
        const conectores = ["que es", "como se escribe", "cual es el significado de", "significado de", "que significa"];
        let terminoLimpio = busquedaUsuario;

        conectores.forEach(c => {
            if (terminoLimpio.startsWith(c)) {
                terminoLimpio = terminoLimpio.replace(c, "").trim();
            }
        });

        const filtrados = datosGlosario.filter(item => {
            const catItem = normalizar(item.Categoria || "");
            const concepto = normalizar(item.Concepto || "");
            
            // Solo buscar dentro de la categoría seleccionada
            if (!catItem.includes(normalizar(categoriaActiva))) return false;

            // Si la barra está vacía, mostrar todo lo de la categoría
            if (busquedaUsuario === "") return true;

            // REGLA PARA SIGLAS (Búsqueda exacta al inicio para evitar AU cuando buscas AD)
            if (categoriaActiva === 'Siglas') {
                return concepto === terminoLimpio || concepto.startsWith(terminoLimpio);
            }

            // BÚSQUEDA FLEXIBLE PARA OTRAS CATEGORÍAS
            return concepto.includes(terminoLimpio) || normalizar(item.Definicion || "").includes(terminoLimpio);
        });

        renderizar(filtrados);
    }

    function renderizar(lista) {
        const contenedor = document.getElementById('termList');
        contenedor.innerHTML = lista.map(item => `
            <li class="term-item">
                <span class="term-title">${item.Concepto}</span>
                <div class="term-definition">${item.Definicion || ''}</div>
            </li>
        `).join('');
    }

    cargarBD();
</script>

</body>
</html>
