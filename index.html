<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glosario Militar Pro</title>
    <style>
        :root {
            --verde-olivo: #4B5320;
            --verde-tierra: #353a16;
            --blanco-humo: #f8f9fa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: #e9ecef; 
            padding: 20px; 
        }

        .container { 
            max-width: 800px; 
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border-top: 8px solid var(--verde-olivo);
        }

        h1 { text-align: center; color: var(--verde-olivo); text-transform: uppercase; letter-spacing: 2px; }

        .categories-nav { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            justify-content: center; 
            margin-bottom: 25px; 
        }

        .btn-cat {
            background-color: var(--verde-olivo);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.85em;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn-cat:hover {
            background-color: var(--verde-tierra);
            transform: translateY(-2px);
        }

        #searchBar { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 25px; 
            border: 2px solid #ced4da; 
            border-radius: 5px; 
            font-size: 16px; 
            outline: none; 
            box-sizing: border-box;
        }

        .term-list { list-style: none; padding: 0; }
        .term-item { 
            background: var(--blanco-humo); 
            border-left: 5px solid var(--verde-olivo); 
            margin-bottom: 15px; 
            padding: 20px; 
            border-radius: 4px; 
            animation: fadeIn 0.4s ease;
        }

        .term-title { font-weight: bold; color: var(--verde-olivo); font-size: 1.3em; display: block; margin-bottom: 5px; }
        .term-definition { color: #444; text-align: justify; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>🎖️ GLOSARIO DE INSTRUCCIÓN</h1>
    
    <div class="categories-nav">
        <button onclick="filtrarPorCategoria('Siglas')" class="btn-cat">Siglas</button>
        <button onclick="filtrarPorCategoria('Términos Militares')" class="btn-cat">Términos Militares</button>
        <button onclick="filtrarPorCategoria('Expresión Gramatical')" class="btn-cat">Expresión Gramatical</button>
    </div>

    <input type="text" id="searchBar" placeholder="🔍 ¿Qué significa...? ¿Qué es...?" onkeyup="filterTerms()">
    
    <ul class="term-list" id="termList">
        <li style="text-align:center; color:gray;">Sincronizando datos...</li>
    </ul>
</div>

<script>
    let datosGlosario = [];
    const urlAPI = 'https://script.google.com/macros/s/AKfycbyc5dPj77GkQCvSJRlyybAtOAWXTKrS9bcJm-Lbhc68FB1BcmcQNYP40Ic9HP2UepZr/exec';

    async function cargarDatos() {
        try {
            const respuesta = await fetch(urlAPI);
            datosGlosario = await respuesta.json();
            document.getElementById('termList').innerHTML = "<li style='text-align:center; color:green;'>✅ Sistema listo. Ingrese su búsqueda.</li>";
        } catch (error) {
            console.error("Error:", error);
            document.getElementById('termList').innerHTML = "<li>⚠️ Error al conectar con la base de datos.</li>";
        }
    }

    function mostrarTerminos(lista) {
        const listaHTML = document.getElementById('termList');
        listaHTML.innerHTML = lista.length === 0 
            ? "<li style='text-align:center; color:gray;'>No se encontraron resultados para esta consulta.</li>"
            : lista.map(item => `
                <li class="term-item">
                    <span class="term-title">${item.Concepto || 'Sin título'}</span>
                    <div class="term-definition">${item.Definicion || item.Definición || 'Sin definición'}</div>
                </li>
            `).join('');
    }

    // Lógica para limpiar el lenguaje natural del usuario
    function limpiarBusqueda(texto) {
        return texto.toLowerCase()
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // Quita tildes para búsqueda flexible
            .replace(/¿|\?|que es|que significa|como se escribe|significado de|definicion de|buscame|que son/g, "")
            .trim();
    }

    function filterTerms() {
        const inputUsuario = document.getElementById('searchBar').value;
        if (inputUsuario === "") { 
            document.getElementById('termList').innerHTML = "<li style='text-align:center; color:green;'>✅ Sistema listo. Ingrese su búsqueda.</li>";
            return; 
        }

        const busquedaLimpia = limpiarBusqueda(inputUsuario);
        
        const filtrados = datosGlosario.filter(item => {
            const concepto = (item.Concepto || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const definicion = (item.Definicion || item.Definición || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            
            return concepto.includes(busquedaLimpia) || definicion.includes(busquedaLimpia);
        });
        
        mostrarTerminos(filtrados);
    }

    function filtrarPorCategoria(cat) {
        document.getElementById('searchBar').value = ""; 
        const filtrados = datosGlosario.filter(item => {
            const catExcel = (item.Categoria || item.Categoría || "").trim().toLowerCase();
            return catExcel === cat.toLowerCase();
        });
        mostrarTerminos(filtrados);
    }

    cargarDatos();
</script>

</body>
</html>
